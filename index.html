<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCAS GIGAWATT ONLY</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Courier New', monospace;
        }

        #kcas-box {
            position: relative;
            width: 300px;
            height: 300px;
            cursor: pointer;
        }

        #kcas-img {
            width: 100%;
            height: 100%;
            background: url('https://i.ibb.co/mF7mS50/kcas-1000.png') no-repeat center/contain;
            filter: drop-shadow(0 0 10px #fb0);
        }

        .shard {
            position: absolute;
            background: url('https://i.ibb.co/mF7mS50/kcas-1000.png') no-repeat;
            background-size: 300px 300px;
            border: 1px solid rgba(255, 0, 0, 0.5);
            transition: all 0.7s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            pointer-events: none;
        }

        #revive-btn {
            display: none;
            margin-top: 50px;
            background: #f00;
            color: #fff;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 30px #f00;
            text-transform: uppercase;
            animation: pulse 1s infinite;
            z-index: 100;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="kcas-box" onclick="detonate()">
        <div id="kcas-img"></div>
    </div>

    <button id="revive-btn" onclick="restore()">ВОСКРЕСИТЬ КСАС</button>

    <script>
        const kcasBox = document.getElementById('kcas-box');
        const kcasImg = document.getElementById('kcas-img');
        const reviveBtn = document.getElementById('revive-btn');

        function detonate() {
            if (kcasImg.style.display === 'none') return;
            
            kcasImg.style.display = 'none';
            document.body.style.backgroundColor = "#200"; // Эффект тревоги

            for (let i = 0; i < 30; i++) {
                const shard = document.createElement('div');
                shard.className = 'shard';
                const w = Math.random() * 80 + 30;
                const h = Math.random() * 80 + 30;
                shard.style.width = w + 'px';
                shard.style.height = h + 'px';
                
                // Раздаем каждому осколку свой кусок картинки
                shard.style.backgroundPosition = `-${Math.random() * 220}px -${Math.random() * 220}px`;
                
                shard.style.left = '110px';
                shard.style.top = '110px';
                kcasBox.appendChild(shard);

                const tx = (Math.random() - 0.5) * 1000;
                const ty = (Math.random() - 0.5) * 1000;
                const rot = Math.random() * 1080;

                setTimeout(() => {
                    shard.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
                    shard.style.opacity = '0';
                }, 20);
            }

            setTimeout(() => {
                reviveBtn.style.display = 'block';
            }, 700);
        }

        function restore() {
            const shards = document.querySelectorAll('.shard');
            shards.forEach(s => s.remove());
            
            kcasImg.style.display = 'block';
            reviveBtn.style.display = 'none';
            document.body.style.backgroundColor = "#000";
        }
    </script>
</body>
</html>
